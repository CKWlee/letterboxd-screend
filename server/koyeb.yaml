services:
  - name: letterboxd-screend-api
    type: web
    git:
      repository: github.com/CKWlee/letterboxd-screend
      branch: main
    build:
      buildpack:
        build_command: pip install -r requirements.txt
        run_command: uvicorn main:app --host 0.0.0.0 --port 8000
    instance_type: nano
    regions:
      - was   # Washington DC — closest to Texas
    env:
      - key: TMDB_API_KEY
        secret: tmdb-api-key
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    health_checks:
      - path: /health
        port: 8000
        initial_delay_seconds: 5
        period_seconds: 30
